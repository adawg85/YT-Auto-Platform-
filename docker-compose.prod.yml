# Production topology for a single DigitalOcean droplet (>=4GB RAM
# recommended for renders).
#   docker compose -f docker-compose.prod.yml up -d --build
# Only caddy is public; everything else stays on the internal network.
# Set secrets in .env (never commit it): OPERATOR_*, provider keys,
# INNGEST_EVENT_KEY + INNGEST_SIGNING_KEY, COCKPIT_DOMAIN.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ytauto
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ytauto}
      POSTGRES_DB: ytauto
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ytauto"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  inngest:
    image: inngest/inngest:latest
    command: >-
      inngest start
      -u http://worker:3010/api/inngest
      --event-key ${INNGEST_EVENT_KEY}
      --signing-key ${INNGEST_SIGNING_KEY}
    environment:
      INNGEST_POSTGRES_URI: postgres://ytauto:${POSTGRES_PASSWORD:-ytauto}@postgres:5432/ytauto
    depends_on:
      - postgres
    restart: unless-stopped

  # one-shot: applies DB migrations, then exits (worker/cockpit wait for it)
  migrate:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    command: ["pnpm", "--filter", "@ytauto/db", "migrate"]
    environment:
      DATABASE_URL: postgres://ytauto:${POSTGRES_PASSWORD:-ytauto}@postgres:5432/ytauto
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://ytauto:${POSTGRES_PASSWORD:-ytauto}@postgres:5432/ytauto
      INNGEST_BASE_URL: http://inngest:8288
      INNGEST_SERVE_HOST: http://worker:3010
      STORE_DIR: /data/store
    volumes:
      - storedata:/data/store
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      inngest:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 2g
    restart: unless-stopped

  cockpit:
    build:
      context: .
      dockerfile: apps/cockpit/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgres://ytauto:${POSTGRES_PASSWORD:-ytauto}@postgres:5432/ytauto
      INNGEST_BASE_URL: http://inngest:8288
      STORE_DIR: /data/store
    volumes:
      - storedata:/data/store
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      inngest:
        condition: service_started
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      # cockpit hostname (served) + optional comma-separated hostnames that 301
      # to it. The redirect default is a harmless placeholder so the Caddyfile
      # parses when only a single domain is deployed.
      COCKPIT_DOMAIN: ${COCKPIT_DOMAIN:-localhost}
      COCKPIT_REDIRECT_FROM: ${COCKPIT_REDIRECT_FROM:-www.localhost}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - cockpit
    restart: unless-stopped

volumes:
  pgdata:
  storedata:
  caddydata:
  caddyconfig:
