# Dev infrastructure only — run the apps on the host with `pnpm dev` for HMR.
#   docker compose up -d
#   pnpm db:migrate && pnpm db:seed && pnpm dev
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ytauto
      POSTGRES_PASSWORD: ytauto
      POSTGRES_DB: ytauto
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ytauto"]
      interval: 5s
      timeout: 3s
      retries: 10

  inngest:
    image: inngest/inngest:latest
    command: >-
      inngest dev
      -u http://host.docker.internal:3000/api/inngest
      -u http://host.docker.internal:3010/api/inngest
    ports:
      - "8288:8288"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Optional: S3-compatible store for dev. With no S3_* env vars the apps use
  # the local-filesystem store instead, so MinIO is not required.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ytauto
      MINIO_ROOT_PASSWORD: ytauto-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >-
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 ytauto ytauto-secret &&
      mc mb --ignore-existing local/ytauto;
      "

volumes:
  pgdata:
  miniodata:
