# Render Blueprint: everything on Render — cockpit (web) + worker (web) +
# Postgres. Media → Cloudflare R2, orchestration → Inngest Cloud.
# Deploy: Render dashboard → New → Blueprint → point at this repo.
# Full step-by-step (R2 token, Inngest sync, data migration): DEPLOY.md.

databases:
  - name: ytauto-db
    plan: basic-1gb # bump from 256mb — headroom for the pgvector memory + joins
    postgresMajorVersion: "16"

services:
  # Durable pipeline worker: Inngest functions + Remotion rendering.
  # RENDERS ARE CPU-BOUND — this plan is the render-speed dial. `pro` = 2 CPU /
  # 4GB (a solid start); go `pro plus` (4 CPU) for faster renders, or `standard`
  # (1 CPU/2GB) to save cost. Must be `web` (not a background worker) so Inngest
  # Cloud can reach /api/inngest.
  - type: web
    name: ytauto-worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    dockerContext: .
    plan: pro
    healthCheckPath: /healthz
    preDeployCommand: pnpm --filter @ytauto/db migrate
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ytauto-db
          property: connectionString
      - key: SECRETS_ENCRYPTION_KEY
        sync: false # same value as the cockpit — they share the secrets table
      - key: INNGEST_EVENT_KEY
        sync: false # from Inngest Cloud
      - key: INNGEST_SIGNING_KEY
        sync: false # from Inngest Cloud
      - key: S3_ENDPOINT
        sync: false # R2 / Spaces endpoint
      - key: S3_REGION
        value: auto
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: RENDER_COST_PER_HOUR
        value: "0.05"

  # Cockpit (Next.js dashboard). `standard` is plenty; SSR is light.
  - type: web
    name: ytauto-cockpit
    runtime: docker
    dockerfilePath: ./apps/cockpit/Dockerfile
    dockerContext: .
    plan: standard
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ytauto-db
          property: connectionString
      - key: OPERATOR_USER
        sync: false
      - key: OPERATOR_PASS
        sync: false
      - key: SECRETS_ENCRYPTION_KEY
        sync: false # same value as the worker
      - key: NEXT_SERVER_ACTIONS_ENCRYPTION_KEY
        sync: false # stable base64 32-byte key; must NOT change between deploys
      - key: PUBLIC_BASE_URL
        sync: false # this cockpit's Render URL, e.g. https://ytauto-cockpit.onrender.com (for YouTube OAuth)
      - key: INNGEST_EVENT_KEY
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
